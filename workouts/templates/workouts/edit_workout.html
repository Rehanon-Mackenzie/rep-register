{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
  <h2>Edit Workout</h2>

  <form method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-primary" type="submit">Save Changes</button>
    <a href="{% url 'workouts:index' %}" class="btn btn-warning btn-cancel">Cancel / Back to My Workouts</a>
  </form>
{% endblock %}
